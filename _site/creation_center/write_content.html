<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Post Creator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Blog Post Creator</h1>
    
    <div class="input-container">
        <label for="title">Title:</label>
        <input type="text" id="title" placeholder="Enter your post title">
    </div>
    
    <div class="input-container">
        <label for="date">Date:</label>
        <input type="text" id="date" readonly>
    </div>
    
    <div class="input-container">
        <label for="time">Time:</label>
        <input type="text" id="time" readonly>
    </div>
    
    <div class="input-container">
        <label for="tags">Tags:</label>
        <input type="text" id="tags" placeholder="Enter tags separated by commas">
    </div>
    
    <div class="input-container">
        <label for="content">Content:</label>
        <div id="toolbar">
            <button onclick="applyStyle('bold')"><strong>B</strong></button>
            <button onclick="applyStyle('italic')"><em>I</em></button>
            <button onclick="applyStyle('underline')"><u>U</u></button>
            <button onclick="applyStyle('strikethrough')"><s>S</s></button>
            <button onclick="applyHeading('h1')">H1</button>
            <button onclick="applyHeading('h2')">H2</button>
            <button onclick="applyHeading('h3')">H3</button>
            <button onclick="insertLink()">Link</button>
            <button onclick="insertImage()">🖼️</button>
            <button onclick="changeTextColor()">🎨</button>
        </div>
        <div id="content" contenteditable="true" placeholder="Enter your post content"></div>
    </div>
    
    <h2>Preview:</h2>
    <div id="preview"></div>

    <h2>Generated HTML:</h2>
    <pre id="generated-html"></pre>

    <h2>Save Content:</h2>
    <button onclick="saveContent('txt')">Save as TXT</button>
    <button onclick="saveContent('html')">Save as HTML</button>
    <button onclick="saveContent('json')">Save as JSON</button>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
